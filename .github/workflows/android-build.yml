name: Android Build

on:
  push:
    branches:
      - "**"
    paths:
      - "android-github-share-target/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-github-share-target
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-share-target-debug-apk
          path: android-github-share-target/app/build/outputs/apk/debug/app-debug.apk

      # Manual runs also commit the APK into the repo, since the upload-artifact
      # storage backend isn't reachable from every client that needs the file.
      - name: Commit APK to branch (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/app-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/app-debug.apk
          git commit -m "Add built debug APK [skip ci]" || echo "nothing to commit"
          git push
